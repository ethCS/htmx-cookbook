name: Deploy To Render

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: render-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Deployment summary
        run: |
          echo "Render deploy hook triggered successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "Configured via secret: RENDER_DEPLOY_HOOK_URL" >> "$GITHUB_STEP_SUMMARY"
